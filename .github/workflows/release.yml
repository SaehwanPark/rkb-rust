name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to crates.io and Homebrew"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Show pinned toolchain
        run: rustup show active-toolchain
      - name: Run release checks
        run: scripts/release-check
      - name: Check package contents
        run: scripts/release-package

  publish-crate:
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.publish == true
    steps:
      - uses: actions/checkout@v5
      - name: Publish crate
        run: cargo publish --locked --token "$CRATES_IO_TOKEN"
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  github-and-homebrew:
    needs: publish-crate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.publish == true
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - name: Install cargo-dist
        run: cargo install cargo-dist --locked
      - name: Publish GitHub artifacts and Homebrew formula
        run: dist build --artifacts=all --no-local-paths
